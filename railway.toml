[build]
builder = "NIXPACKS"
buildCommand = "npm run build"

[deploy]
startCommand = "node api/index.js"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5

[params]
PORT = 5000
NODE_ENV = "production"

# Railway Healthcheck
[healthcheck]
path = "/api/health"
interval = 30
timeout = 5
successThreshold = 1
failureThreshold = 3
